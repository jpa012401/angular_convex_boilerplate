<main class="auth-layout">
  <!-- Left Panel - Form Side -->
  <section class="auth-form-panel">
    <header class="brand">
      <span class="brand-text">A N G U L A R</span>
      <div class="brand-divider"></div>
      <span class="brand-text">C O N V E X</span>
    </header>

    <div class="form-container">
      <ng-content />
    </div>

    <footer class="panel-footer">
      <span class="footer-year">2026</span>
      <span class="footer-divider">/</span>
      <span class="footer-text">Crafted with precision</span>
    </footer>
  </section>

  <!-- Right Panel - Visual Side -->
  <aside class="auth-visual-panel">
    <div class="visual-content">
      <div class="hero-image">
        <div class="image-overlay"></div>
        <div class="geometric-accent accent-1"></div>
        <div class="geometric-accent accent-2"></div>
        <div class="geometric-accent accent-3"></div>
      </div>

      <blockquote class="editorial-quote">
        <p class="quote-text">"Design is intelligence made visible."</p>
        <cite class="quote-author">— Alina Wheeler</cite>
      </blockquote>

      <div class="visual-decoration">
        <div class="deco-line"></div>
        <span class="deco-number">01</span>
      </div>
    </div>
  </aside>
</main>
