<div class="todo-list">
  @if (todos().isLoading) {
    <div class="loading-state">
      <div class="spinner" aria-hidden="true"></div>
      <span class="loading-text">Loading your tasks</span>
    </div>
  } @else if (todos().data?.length === 0) {
    <div class="empty-state">
      <div class="empty-icon-wrapper">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <line x1="9" y1="9" x2="15" y2="15" />
          <line x1="15" y1="9" x2="9" y2="15" />
        </svg>
      </div>
      <p class="empty-title">No tasks yet</p>
      <p class="empty-subtitle">Begin by adding your first endeavor above</p>
    </div>
  } @else {
    <ul class="todos" role="list">
      @for (todo of todos().data; track todo._id; let i = $index) {
        <li class="todo-item-wrapper" [style.animation-delay.ms]="i * 50">
          <app-todo-item [todo]="todo" />
        </li>
      }
    </ul>
  }
</div>
